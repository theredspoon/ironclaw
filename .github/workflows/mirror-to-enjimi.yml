name: Mirror to enjimi

on:
  push:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to enjimi
        run: |
          git remote add enjimi https://x-access-token:${{ secrets.ENJIMI_PAT }}@github.com/enjimi/ironclaw.git
          git push enjimi "$GITHUB_REF" --tags --force
